name: Image Size Diff

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  image-size-diff:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      REGCTL_VERSION: v0.11.2
      PLATFORM: linux/amd64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install regctl
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/regclient/regclient/releases/download/${REGCTL_VERSION}/regctl-linux-amd64" -o regctl
          chmod +x regctl
          sudo mv regctl /usr/local/bin/regctl

      - name: Build images, compute size deltas, and write report
        id: report
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail

          # Edit these entries to match the images this repo builds.
          # Format:
          # name|context|dockerfile|image_suffix|max_size_mb|max_delta_mb
          images=(
            "dev-base|.|./Dockerfile|dev-base|600|50"
            "dev-tools|.|./Dockerfile.tools|dev-tools|1200|75"
          )

          mkdir -p .github/image-size-report/diffs

          mb() {
            awk -v bytes="$1" 'BEGIN { printf "%.1f", bytes / 1024 / 1024 }'
          }

          inspect_ref_size() {
            local ref="$1"
            local raw digest

            raw="$(docker buildx imagetools inspect --raw "$ref")"

            if echo "$raw" | jq -e '.manifests' >/dev/null 2>&1; then
              digest="$(
                echo "$raw" | jq -r --arg platform "$PLATFORM" '
                  .manifests[]
                  | select((.platform.os + "/" + .platform.architecture) == $platform)
                  | select((.annotations["vnd.docker.reference.type"] // "") != "attestation-manifest")
                  | .digest
                ' | head -n1
              )"

              if [[ -z "$digest" ]]; then
                return 1
              fi

              raw="$(docker buildx imagetools inspect --raw "${ref%%@*}@${digest}")"
            fi

            echo "$raw" | jq '[.layers[].size, .config.size] | add'
          }

          {
            echo "# OCI image size report"
            echo
            echo "Compared against the image tags from \`main\` using compressed registry manifest sizes."
            echo
            echo "| Image | Baseline | Candidate | Delta | Max | Max delta | Status |"
            echo "| --- | ---: | ---: | ---: | ---: | ---: | --- |"
          } > .github/image-size-report/comment.md

          failed=0

          for entry in "${images[@]}"; do
            IFS="|" read -r name context dockerfile suffix max_size_mb max_delta_mb <<< "$entry"

            baseline_ref="${REGISTRY}/${REPO}/${suffix}:main"
            candidate_ref="${REGISTRY}/${REPO}/${suffix}:pr-${PR_NUMBER}-${SHA}"
            diff_file=".github/image-size-report/diffs/${name}.txt"

            if [[ ! -f "$dockerfile" ]]; then
              echo "| ${name} | n/a | n/a | n/a | ${max_size_mb} MiB | ${max_delta_mb} MiB | missing Dockerfile |" >> .github/image-size-report/comment.md
              failed=1
              continue
            fi

            docker buildx build \
              --platform "$PLATFORM" \
              --file "$dockerfile" \
              --tag "$candidate_ref" \
              --provenance=false \
              --sbom=false \
              --push \
              "$context"

            candidate_bytes="$(inspect_ref_size "$candidate_ref")"
            candidate_mb="$(mb "$candidate_bytes")"

            baseline_bytes=""
            baseline_mb="n/a"
            delta_mb="n/a"
            status="ok"

            if docker buildx imagetools inspect "$baseline_ref" >/dev/null 2>&1; then
              baseline_bytes="$(inspect_ref_size "$baseline_ref")"
              baseline_mb="$(mb "$baseline_bytes")"

              delta_bytes=$((candidate_bytes - baseline_bytes))
              if (( delta_bytes >= 0 )); then
                delta_mb="+$(mb "$delta_bytes")"
              else
                delta_mb="-$(mb "$((-delta_bytes))")"
              fi

              regctl manifest diff --context 0 "$baseline_ref" "$candidate_ref" > "$diff_file" || true

              if (( candidate_bytes > max_size_mb * 1024 * 1024 )); then
                status="over absolute budget"
                failed=1
              elif (( delta_bytes > max_delta_mb * 1024 * 1024 )); then
                status="over delta budget"
                failed=1
              fi
            else
              status="baseline missing"
            fi

            echo "| ${name} | ${baseline_mb} MiB | ${candidate_mb} MiB | ${delta_mb} MiB | ${max_size_mb} MiB | ${max_delta_mb} MiB | ${status} |" >> .github/image-size-report/comment.md

            {
              echo
              echo "<details><summary>${name} details</summary>"
              echo
              echo "- Baseline: \`${baseline_ref}\`"
              echo "- Candidate: \`${candidate_ref}\`"
              echo "- Platform: \`${PLATFORM}\`"
              if [[ -s "$diff_file" ]]; then
                echo
                echo '```diff'
                sed -n '1,200p' "$diff_file"
                echo '```'
              else
                echo
                echo "No manifest diff available."
              fi
              echo
              echo "</details>"
            } >> .github/image-size-report/comment.md
          done

          cat .github/image-size-report/comment.md >> "$GITHUB_STEP_SUMMARY"

          if (( failed )); then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "failed=false" >> "$GITHUB_OUTPUT"

      - name: Clean up temporary PR tags
        if: always()
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set +e

          images=(
            "dev-base|.|./Dockerfile|dev-base|600|50"
            "dev-tools|.|./Dockerfile.tools|dev-tools|1200|75"
          )

          for entry in "${images[@]}"; do
            IFS="|" read -r _ _ _ suffix _ _ <<< "$entry"
            candidate_ref="${REGISTRY}/${REPO}/${suffix}:pr-${PR_NUMBER}-${SHA}"
            regctl manifest delete "$candidate_ref"
          done

      - name: Post sticky PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: image-size-report
          path: .github/image-size-report/comment.md
